# 环境配置（所有spring配置合并为一个）
spring:
  profiles:
    active: local
  application:
    name: awards-backend
  main:
    allow-bean-definition-overriding: true
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/awards?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: jfy123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: 0

# 服务器配置
server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# Swagger3接口文档
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Sa-Token 权限认证
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  is-read-header: true
  is-read-cookie: false
  is-read-body: false
  is-read-query: true
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  is-log: false

# 自定义配置
storage:
  base-dir: ./data/files
export:
  out-dir: ./data/exports
  template:
    detail: ./templates/detail_template.xlsx
    summary: ./templates/summary_template.xlsx